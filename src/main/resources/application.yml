server:
  port: 8080

spring:
  application:
    name: customer-service-agent
  autoconfigure:
    exclude:
      - dev.langchain4j.ollama.spring.AutoConfig

# OpenAI (default LLM provider)
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:sk-Fat40iO2E1f7QyV9Sj9Drx9m2NlTmba911ITJ5aFPbAD2ejh}
      model-name: ${OPENAI_MODEL:gpt-3.5-turbo}
      base-url: https://api.chatanywhere.tech
      temperature: 0.2
      timeout: PT60S
      log-requests: false
      log-responses: false
      strict-tools: true
      max-retries: 2

  # Ollama (optional local LLM, enable via profile: ollama)
  ollama:
    chat-model:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_MODEL:qwen2.5:7b}
      timeout: PT120S

app:
  llm:
    provider: ${LLM_PROVIDER:openai}
  agent:
    # ReAct 最大推理轮次（每次 LLM 返回工具调用 = 1 轮 Thought→Action→Observation）
    max-sequential-tool-invocations: ${AGENT_MAX_TOOL_ROUNDS:10}
  order:
    simulate-transient-failure: ${SIMULATE_ORDER_FAILURE:false}
    transient-failure-rate: 3
  resilience:
    param-correction-enabled: true
    order-retry:
      max-attempts: 3
      delay-ms: 500
      multiplier: 2.0

resilience4j:
  circuitbreaker:
    instances:
      aiAgent:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 3
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.customerservice: INFO
    dev.langchain4j: WARN
